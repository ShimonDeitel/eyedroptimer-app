name: Eye Drop Timer
options:
  bundleIdPrefix: com.shimondeitel.eyedroptimer
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Eye Drop Timer:
    type: application
    platform: iOS
    sources:
      - path: Eye Drop Timer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.eyedroptimer
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Eye Drop Timer/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  Eye Drop TimerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Eye Drop TimerTests
      - path: Eye Drop Timer.storekit
    dependencies:
      - target: Eye Drop Timer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.eyedroptimer.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  Eye Drop TimerUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Eye Drop TimerUITests
    dependencies:
      - target: Eye Drop Timer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.eyedroptimer.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Eye Drop Timer:
    build:
      targets:
        Eye Drop Timer: all
        Eye Drop TimerTests: [test]
        Eye Drop TimerUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Eye Drop Timer.storekit
    test:
      config: Debug
      storeKitConfiguration: Eye Drop Timer.storekit
      targets:
        - Eye Drop TimerTests
        - Eye Drop TimerUITests
    archive:
      config: Release
